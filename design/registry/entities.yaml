# 游戏世界实体注册表
#
# 目的：所有出现在多个文档中的命名游戏世界事实的唯一真实来源。技能在编写新内容前会检查此文件，
#       以在编写时检测跨文档的不一致性。
#
# 规则：
#   - 仅注册跨越系统边界的事实。仅在内部使用的事实
#     （仅在一个 GDD 中使用的公式）不需要注册。
#   - 永不删除条目 — 改为设置 status: deprecated。
#   - 当值更改时：更新值，设置 revised: 为今天的日期，
#     并在注释中添加旧值以及是哪个 GDD 更改了它。
#   - source: 是权威的 GDD — 即“拥有”此事实的 GDD。
#     引用它的其他 GDD 在 referenced_by 中列出自己。
#   - 当一个新的 GDD 引用现有条目时，将其路径追加到
#     referenced_by。不要创建重复条目。
#
# 编写者：/design-system（第 5 阶段 — 在 GDD 部分获得批准后）
#         /consistency-check（解决冲突时）
# 读取者：/design-system（第 2 阶段 — 在编写开始前，以及
#           Section C/D 写入后，用于冲突检查新实体/公式）
#         /consistency-check（主要输入 — 先 grep，后 GDD）
#         /review-all-gdds（第 1 阶段 — 第 2 阶段检查的基准）
#         /architecture-review（数据结构和接口验证）
#
# 搜索模式（供使用 Grep 的技能）：
#   所有实体名称：        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   特定实体：           Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   所有物品：           Grep pattern="^  - name:" path="design/registry/entities.yaml"（items 部分）
#   combat.md 拥有的内容： Grep pattern="source: design/gdd/combat.md"
#   inventory.md 使用的内容：Grep pattern="referenced_by.*inventory"
#   所有金币值：          Grep pattern="value_gold:"
#   已废弃的条目：        Grep pattern="status: deprecated"
#
# 格式：YAML。一致的缩进对于 grep 可靠性至关重要。
#   部分：entities | items | formulas | constants
#   每个条目：name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: ""

# ─── 实体 ────────────────────────────────────────────────────────────────
# 命名的游戏世界对象：敌人、NPC、角色、派系、首领。
# 当一个实体出现在多个 GDD 中时，在此注册 — 例如，
# 一个在 combat.md 中定义的敌人，也在 inventory.md 中列出掉落物品。
#
# 必填字段：name, status, source, referenced_by, added
# 属性字段：任何可能出现在另一个 GDD 中的关键属性
#   (health, damage, drops, faction, 等。)

entities: []

# 示例（添加第一个真实条目时移除）：
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # 必须与 items 部分的条目匹配
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── 物品 ───────────────────────────────────────────────────────────────────
# 命名的可收集物、装备、消耗品、制作材料、货币。
# 当一个物品的名称或值出现在多个 GDD 中时进行注册。
#
# 必填字段：name, status, source, referenced_by, added
# 属性字段：value_gold, weight, stackable, category, 以及任何其他系统
#   （例如，经济、制作）可能引用的属性修饰符。

items: []

# 示例：
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # 掉落定义在 combat GDD 中
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD 列出其重量/堆叠规则
#       - design/gdd/economy.md      # economy GDD 引用其售价
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── 公式 ────────────────────────────────────────────────────────────────
# 具有定义的变量和输出范围的命名计算。
# 当一个公式的输出馈送到另一个系统的输入，
# 或另一个 GDD 按名称引用它时进行注册。
#
# 必填字段：name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# 可选：expression（实际公式）, notes

formulas: []

# 示例：
#
# formulas:
#   - name: damage_formula
#     status: active
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/progression.md   # progression GDD 扩展 attack 变量
#     variables:
#       - attack
#       - defense
#       - crit_chance
#       - crit_multiplier
#     output_range: [0, 999]
#     expression: "max(0, attack - defense) * (1 + crit_chance * crit_multiplier)"
#     notes: "Output feeds into health-system damage intake. Min is 0 (armour
#       can absorb all damage). Max is uncapped in formula but tuning knob
#       damage_cap in combat.md clamps at 999."
#     added: 2026-03-26
#     revised: ""


# ─── 常量 ───────────────────────────────────────────────────────────────
# 跨多个系统引用的命名数值。
# 当一个常量在一个 GDD 中定义，但另一个 GDD 必须
# 与之保持一致时进行注册（例如，在经济中定义的黄金携带上限，
# 但在库存中检查；或在库存中定义的基础物品栏槽位，
# 但在 HUD 中显示）。
#
# 必填字段：name, status, source, referenced_by, value, unit, added

constants: []

# 示例：
#
# constants:
#   - name: gold_carry_limit
#     status: active
#     source: design/gdd/economy.md
#     referenced_by:
#       - design/gdd/economy.md
#       - design/gdd/inventory.md   # inventory 强制执行携带上限
#       - design/gdd/ui.md          # HUD 显示当前金币与上限
#     value: 9999
#     unit: gold
#     added: 2026-03-26
#     revised: ""
#
#   - name: base_inventory_slots
#     status: active
#     source: design/gdd/inventory.md
#     referenced_by:
#       - design/gdd/inventory.md
#       - design/gdd/progression.md  # progression 解锁额外的槽位
#     value: 20
#     unit: slots
#     added: 2026-03-26
#     revised: ""