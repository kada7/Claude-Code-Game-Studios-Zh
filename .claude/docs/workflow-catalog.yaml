# 工作流程目录
# 由 /help 用于确定用户当前位置和下一步操作。
#
# 制品检查：
#   glob: 文件通配符模式 — 如果匹配文件数 ≥1 (或 min_count) 则完成
#   pattern: 必须在文件中出现的文本模式（在 glob 后检查）
#   min_count: 所需的最小匹配文件数（默认：1）
#   note: 当无法自动检测完成时的人类可读回退
#
# required: true → 阻止进入下一阶段（显示为 必需）
# required: false → 可选增强（显示为 可选）
# repeatable: true → 运行多次（每个系统、故事等一次）
#
# 阶段门控 (/gate-check)：判定为 咨询性 — 它们指导决策
# 但从不硬性阻止进展。用户始终决定是否继续。

phases:

  concept:
    label: "概念"
    description: "将你的游戏想法发展为文档化的概念"
    next_phase: systems-design
    steps:
      - id: brainstorm
        name: "头脑风暴"
        command: /brainstorm
        required: false
        description: "使用 MDA、动词优先和玩家心理框架探索游戏概念"

      - id: engine-setup
        name: "引擎设置"
        command: /setup-engine
        required: true
        artifact:
          glob: ".claude/docs/technical-preferences.md"
          pattern: "Engine: [^[]"
        description: "配置引擎、固定版本、设置命名约定和性能预算"

      - id: game-concept
        name: "游戏概念文档"
        command: /brainstorm
        required: true
        artifact:
          glob: "design/gdd/game-concept.md"
        description: "使用支柱、MDA 分析和范围层级正式化概念"

      - id: design-review-concept
        name: "概念评审"
        command: /design-review
        required: false
        description: "验证游戏概念（建议在继续前进行）"

      - id: art-bible
        name: "美术圣经"
        command: /art-bible
        required: true
        artifact:
          glob: "design/art/art-bible.md"
        description: "创作视觉风格规范（9个部分）。使用由 /brainstorm 产生的视觉身份锚点。在游戏概念形成后、系统设计前运行。"

      - id: map-systems
        name: "系统映射"
        command: /map-systems
        required: true
        artifact:
          glob: "design/gdd/systems-index.md"
        description: "将概念分解为具有依赖关系和优先级层级的系统"

  systems-design:
    label: "系统设计"
    description: "为系统索引中的每个系统编写 GDD"
    next_phase: technical-setup
    steps:
      - id: design-system
        name: "系统 GDD"
        command: /design-system
        required: true
        repeatable: true
        artifact:
          note: "检查 design/gdd/systems-index.md — 每个 MVP 系统需要状态：已批准"
        description: "编写每个系统的 GDD（引导式，逐个部分）。每个系统运行一次。"

      - id: design-review
        name: "每系统设计评审"
        command: /design-review
        required: true
        repeatable: true
        description: "验证每个 GDD（8个必需部分，无 重大修订 判定）。每个系统运行。"

      - id: review-all-gdds
        name: "跨 GDD 评审"
        command: /review-all-gdds
        required: true
        artifact:
          glob: "design/gdd/gdd-cross-review-*.md"
        description: "所有 GDD 的整体一致性检查 + 设计理论评审，同时进行"

      - id: consistency-check
        name: "一致性检查"
        command: /consistency-check
        required: false
        repeatable: true
        description: "扫描所有 GDD 是否存在矛盾、未定义引用和机制冲突。在 /review-all-gdds 后运行，并在项目中期添加或修订 GDD 时再次运行。"

  technical-setup:
    label: "技术设置"
    description: "架构决策、视觉风格规范、可访问性基础、引擎验证"
    next_phase: pre-production
    steps:
      - id: create-architecture
        name: "架构文档"
        command: /create-architecture
        required: true
        artifact:
          glob: "docs/architecture/architecture.md"
        description: "编写涵盖所有系统的主架构文档"

      - id: architecture-decision
        name: "架构决策 (ADR)"
        command: /architecture-decision
        required: true
        repeatable: true
        artifact:
          glob: "docs/architecture/adr-*.md"
          min_count: 3
        description: "将关键技术决策记录为 ADR。至少需要 3 个基础层 ADR。"

      - id: architecture-review
        name: "架构评审"
        command: /architecture-review
        required: true
        artifact:
          glob: "docs/architecture/architecture-review-*.md"
        description: "验证完整性、依赖关系排序、引擎兼容性"

      - id: control-manifest
        name: "控制清单"
        command: /create-control-manifest
        required: true
        artifact:
          glob: "docs/architecture/control-manifest.md"
        description: "从所有已接受的 ADR 生成的平面程序员规则表"

      - id: accessibility-doc
        name: "可访问性要求"
        required: true
        artifact:
          glob: "design/accessibility-requirements.md"
        description: "承诺可访问性层级（基本/标准/全面/典范）和功能矩阵。UX 规范（阶段 4）参考此层级。"

  pre-production:
    label: "预生产"
    description: "UX 规范、资源规范、原型化核心机制、定义故事、验证趣味性"
    next_phase: production
    steps:
      - id: asset-spec
        name: "资源规范"
        command: /asset-spec
        required: false
        repeatable: true
        artifact:
          glob: "design/assets/asset-manifest.md"
        description: "从已批准的 GDD 和关卡文档生成每个资源的视觉规范和 AI 生成提示。每个系统/关卡/角色运行一次。"

      - id: ux-design
        name: "UX 规范（关键界面）"
        command: /ux-design
        required: true
        repeatable: true
        artifact:
          glob: "design/ux/*.md"
          min_count: 1
        description: "为主菜单、核心游戏 HUD 和交互模式编写 UX 规范。从 technical-preferences.md 读取输入方法和平台。"

      - id: ux-review
        name: "UX 评审"
        command: /ux-review
        required: true
        description: "验证所有关键界面 UX 规范是否符合 GDD 和可访问性层级要求。在创建史诗前运行。"

      - id: prototype
        name: "原型"
        command: /prototype
        required: true
        artifact:
          glob: "prototypes/*/README.md"
          min_count: 1
        description: "在独立工作树中构建可抛弃的原型以验证核心机制"

      - id: create-epics
        name: "创建史诗"
        command: /create-epics
        required: true
        repeatable: true
        artifact:
          glob: "production/epics/*/EPIC.md"
          min_count: 1
        description: "将 GDD + ADR 转换为史诗 — 每个架构模块一个。按层运行：/create-epics layer: foundation，然后 /create-epics layer: core"

      - id: create-stories
        name: "创建故事"
        command: /create-stories
        required: true
        repeatable: true
        artifact:
          glob: "production/epics/**/*.md"
          min_count: 2
        description: "将每个史诗分解为可实施的故事文件。每个史诗运行：/create-stories [史诗-slug]"

      - id: test-setup
        name: "测试框架设置"
        command: /test-setup
        required: false
        artifact:
          note: "检查 tests/ 目录是否存在引擎特定的测试框架脚手架"
        description: "在第一个冲刺前一次性构建测试框架和 CI 流水线。引导至 /test-helpers 以生成夹具、每个史诗的 /qa-plan 和每个冲刺的 /smoke-check。"

      - id: sprint-plan
        name: "第一个冲刺计划"
        command: /sprint-plan
        required: true
        artifact:
          glob: "production/sprints/sprint-*.md"
          min_count: 1
        description: "使用来自史诗的优先级故事规划第一个冲刺"

      - id: vertical-slice
        name: "垂直切片（已游戏测试）"
        command: /playtest-report
        required: true
        artifact:
          glob: "production/playtests/*.md"
          min_count: 1
        description: "使用 /playtest-report 记录垂直切片游戏测试会话。至少在此运行一次（生产阶段前需要 ≥1 次；优化阶段前需要 ≥3 次）。每次会话应涵盖核心循环的完整运行。"

  production:
    label: "生产"
    description: "基于冲刺的功能开发 — 选择、实施、完成故事"
    next_phase: polish
    steps:
      - id: sprint-plan
        name: "冲刺计划"
        command: /sprint-plan
        required: true
        repeatable: true
        artifact:
          glob: "production/sprints/sprint-*.md"
        description: "使用优先级化的就绪故事规划当前冲刺"

      - id: story-readiness
        name: "故事就绪检查"
        command: /story-readiness
        required: false
        description: "在开发人员接手前验证故事是否准备好实施"

      - id: implement
        name: "实施故事"
        command: /dev-story
        required: true
        repeatable: true
        artifact:
          note: "检查 src/ 中的活动代码和 production/epics/**/*.md 中的进行中故事"
        description: "选择下一个就绪的故事并使用 /dev-story [故事路径] 实施。路由到正确的程序员代理。"

      - id: code-review
        name: "代码评审"
        command: /code-review
        required: false
        repeatable: true
        description: "每个故事实施后的架构代码评审。在 /dev-story 后运行，/story-done 前运行。"

      - id: story-done
        name: "故事完成评审"
        command: /story-done
        required: true
        repeatable: true
        description: "验证所有验收标准，检查 GDD/ADR 偏差，完成故事"

      - id: qa-plan
        name: "QA 计划"
        command: /qa-plan
        required: false
        repeatable: true
        description: "为每个史诗或冲刺生成 QA 测试计划。运行 /qa-plan [史诗-slug]。为 /smoke-check、/regression-suite 和 /test-evidence-review 生成测试案例。"

      - id: bug-report
        name: "缺陷报告/分类"
        command: /bug-report
        required: false
        repeatable: true
        description: "记录并优先排序实施过程中发现的缺陷。/bug-report 创建结构化报告；/bug-triage 对未解决的待办事项进行分类。"

      - id: retrospective
        name: "冲刺回顾"
        command: /retrospective
        required: false
        repeatable: true
        description: "冲刺后审查以捕获有效和需要更改的内容。在每个冲刺结束时运行，在计划下一个冲刺前运行。"

      - id: team-feature
        name: "团队协调（可选）"
        required: false
        repeatable: true
        description: "协调多个代理处理复杂功能。使用：/team-combat、/team-narrative、/team-ui、/team-audio、/team-level、/team-live-ops、/team-qa。当功能跨越多个代理领域时运行。"

      - id: scope-check
        name: "范围检查"
        command: /scope-check
        required: false
        repeatable: true
        artifact:
          glob: "production/sprints/sprint-*.md"
          note: "冲刺中期添加故事时，或冲刺回顾前运行"
        description: "通过比较当前冲刺范围与原史诗范围来检测范围蔓延。在 (a) 冲刺中期添加故事时，或 (b) 冲刺回顾前运行。"

      - id: sprint-status
        name: "冲刺状态"
        command: /sprint-status
        required: false
        description: "快速 30 行冲刺进度快照，无需完整报告"

  polish:
    label: "优化"
    description: "性能、平衡、游戏测试、缺陷修复"
    next_phase: release
    steps:
      - id: perf-profile
        name: "性能分析"
        command: /perf-profile
        required: false
        description: "分析并优化 CPU/GPU/内存瓶颈"

      - id: balance-check
        name: "平衡检查"
        command: /balance-check
        required: false
        description: "分析游戏平衡公式和数据中的异常值和破坏性进展"

      - id: asset-audit
        name: "资源审计"
        command: /asset-audit
        required: false
        description: "验证命名约定、文件格式标准和大小预算"

      - id: playtest-polish
        name: "游戏测试会话 (×3)"
        command: /playtest-report
        required: true
        artifact:
          glob: "production/playtests/*.md"
          min_count: 3
        description: "覆盖：新玩家体验、中期游戏系统、难度曲线"

      - id: team-polish
        name: "优化团队审查"
        command: /team-polish
        required: true
        description: "跨性能、音频、视觉和 UX 的协调优化审查"

  release:
    label: "发布"
    description: "发布准备、认证和交付"
    next_phase: null
    steps:
      - id: release-checklist
        name: "发布检查清单"
        command: /release-checklist
        required: true
        description: "所有部门（代码、内容、商店、法律）的预发布验证"

      - id: patch-notes
        name: "补丁说明"
        command: /patch-notes
        required: false
        description: "根据 git 历史和冲刺数据生成面向玩家的补丁说明"

      - id: changelog
        name: "变更日志"
        command: /changelog
        required: false
        description: "根据提交、冲刺和设计文档自动生成内部变更日志"

      - id: launch-checklist
        name: "发布检查清单"
        command: /launch-checklist
        required: true
        description: "最终发布准备 — 交付给玩家前的最后门控"